<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>달무티 온라인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F5F2;
    --panel:#FFFFFF;
    --panel-2:#F0EEE9;
    --line:#E3E0D8;
    --gold:#B8892B;
    --gold-bright:#D9A93F;
    --crimson:#B5434F;
    --crimson-bright:#C4495A;
    --parchment:#EFE6CC;
    --good:#5E9E6E;
    --good-bg:#E4F1E6;
    --good-line:#B9D9BE;
    --text:#1C1B1F;
    --text-dim:#767268;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-0.01em; margin:0;}
  button{
    font-family:'Inter',sans-serif;
    font-weight:600;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:background .15s ease, border-color .15s ease;
  }
  button:hover:not(:disabled){background:#EAE7DF; border-color:#D3CFC4;}
  button:disabled{opacity:.4; cursor:not-allowed;}
  button.primary{background:var(--gold); border-color:var(--gold); color:#fff;}
  button.primary:hover:not(:disabled){background:var(--gold-bright); border-color:var(--gold-bright);}
  button.danger{background:var(--crimson); border-color:var(--crimson); color:#fff;}
  button.danger:hover:not(:disabled){background:var(--crimson-bright); border-color:var(--crimson-bright);}
  input{
    font-family:'Inter',sans-serif;
    background:#fff;
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:8px;
    font-size:15px;
  }
  input:focus{outline:2px solid var(--gold); outline-offset:1px;}
  ::selection{background:var(--gold); color:#fff;}

  .screen{min-height:100vh; display:none; flex-direction:column; align-items:center;}
  .screen.active{display:flex;}

  /* ---- Connect screen ---- */
  #screen-connect{justify-content:center; padding:24px;}
  .crest{
    width:56px;height:56px;border-radius:50%;
    background:var(--gold); color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;
    margin:0 auto 16px;
  }
  .connect-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:36px 32px;
    width:min(420px, 92vw);
    text-align:center;
    box-shadow:0 8px 28px rgba(0,0,0,.05);
  }
  .connect-card h1{font-size:26px; margin-bottom:4px;}
  .connect-card .tag{color:var(--text-dim); font-size:12.5px; margin-bottom:26px; letter-spacing:.04em;}
  .field{text-align:left; margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px;}
  .field input{width:100%;}
  .divider{display:flex; align-items:center; gap:10px; margin:22px 0 16px; color:var(--text-dim); font-size:12px;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}
  #connect-error{color:var(--crimson); font-size:13px; min-height:18px; margin-top:10px;}

  /* ---- Lobby ---- */
  #screen-lobby{padding:24px; width:min(720px,94vw);}
  .lobby-card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:28px; width:100%;}
  .room-code-badge{
    display:inline-flex; align-items:center; gap:10px;
    background:var(--bg); border:1px solid var(--line); border-radius:8px;
    padding:8px 16px; margin-bottom:22px;
  }
  .room-code-badge .code{font-family:'JetBrains Mono',monospace; font-size:20px; letter-spacing:.12em; color:var(--gold); font-weight:700;}
  .player-list{list-style:none; padding:0; margin:0 0 8px;}
  .player-list li{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; border-bottom:1px solid var(--line); font-size:15px;
  }
  .player-list li:last-child{border-bottom:none;}
  .host-tag{font-size:11px; color:var(--gold); border:1px solid var(--gold); border-radius:4px; padding:2px 6px; margin-left:8px;}
  .kick-btn{
    font-size:11.5px; padding:4px 10px; border-radius:6px;
    border:1px solid var(--line); background:transparent; color:var(--text-dim);
  }
  .kick-btn:hover{background:var(--crimson); border-color:var(--crimson); color:#fff;}
  .mini-kick-btn{
    align-self:flex-end; font-size:10.5px; padding:2px 8px; border-radius:5px; margin-top:2px;
    border:1px solid var(--line); background:transparent; color:var(--text-dim);
  }
  .mini-kick-btn:hover{background:var(--crimson); border-color:var(--crimson); color:#fff;}
  .hint{color:var(--text-dim); font-size:13px; line-height:1.6; margin-top:14px;}

  .extra-card-box{margin:18px 0 4px; padding:14px 16px; border:1px solid var(--line); border-radius:10px; background:var(--bg); text-align:left; display:none;}
  .ecb-title{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; margin-bottom:4px;}
  .ecb-desc{font-size:12.5px; color:var(--text-dim); margin-bottom:10px;}
  .ecb-options{display:flex; flex-wrap:wrap; gap:7px 16px; margin-bottom:10px;}
  .ecb-opt{display:flex; align-items:center; gap:6px; font-size:13px;}
  .ecb-status{font-size:12px; color:var(--text-dim);}

  /* ---- Game screen ---- */
  #screen-game{width:100%; align-items:stretch; padding:0;}
  .game-layout{display:grid; grid-template-columns:220px 1fr; min-height:100vh;}
  @media (max-width:820px){ .game-layout{grid-template-columns:1fr;} .hierarchy{order:2;} .table-wrap{order:1;} }

  .hierarchy{background:var(--panel); border-right:1px solid var(--line); padding:18px 12px; display:flex; flex-direction:column; gap:6px;}
  .hierarchy h3{font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; text-align:center; font-weight:600;}
  .rank-step{
    border-radius:8px; padding:8px 10px; border:1px solid var(--line); background:var(--bg);
    font-size:12.5px; display:flex; flex-direction:column; gap:2px;
  }
  .rank-step.me{border-color:var(--gold);}
  .rank-step.turn{border-color:var(--crimson);}
  .rank-step.done{background:var(--good-bg); border-color:var(--good-line);}
  .rank-step .title{color:var(--gold); font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:11.5px;}
  .rank-step .name{font-weight:600;}
  .rank-step .cnt{color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px;}

  .table-wrap{display:flex; flex-direction:column; min-height:100vh;}
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 22px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  .topbar .code{font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:13px; letter-spacing:.08em;}
  .topbar-right{display:flex; align-items:center; gap:8px;}
  .status-pill{font-size:12px; padding:5px 12px; border-radius:20px; background:var(--panel-2); border:1px solid var(--line); color:var(--text-dim);}
  .log-toggle{font-size:12px; padding:5px 12px; border-radius:20px;}
  .log-toggle.active{border-color:var(--gold); color:var(--gold);}
  .end-game-btn{color:var(--crimson); border-color:var(--crimson);}
  .end-game-btn:hover:not(:disabled){background:var(--crimson); color:#fff;}

  .table-center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; gap:18px; position:relative;}
  .turn-banner{font-family:'Space Grotesk',sans-serif; font-size:15px; color:var(--text-dim); text-align:center;}
  .turn-banner b{color:var(--gold);}
  .last-play{display:flex; gap:8px; min-height:96px; align-items:center; justify-content:center; flex-wrap:wrap;}
  .empty-note{color:var(--text-dim); font-size:13px; font-style:italic;}

  .card{
    width:58px; height:84px; border-radius:8px;
    background:var(--parchment);
    border:1px solid #B9A46B;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#3A2F13; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:22px;
    box-shadow:0 2px 8px rgba(0,0,0,.10);
    position:relative; user-select:none;
  }
  .card.joker{background:#E9DBFB; border-color:#B79BDB; color:#4A2E70; font-size:12px; text-align:center;}
  .card .sub{position:absolute; bottom:5px; font-size:8px; color:#786338; letter-spacing:.05em;}
  .reveal-toggle{
    position:absolute; top:-7px; right:-7px; width:20px; height:20px; border-radius:50%;
    border:1px solid var(--line); background:#fff; padding:0; font-size:10px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-dim);
  }
  .reveal-toggle.active{background:var(--gold); border-color:var(--gold); color:#fff;}

  .revealed-strip{display:flex; margin-top:5px;}
  .mini-card{
    width:20px; height:28px; border-radius:4px; flex-shrink:0;
    background:var(--parchment); border:1px solid #B9A46B;
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:9px; color:#3A2F13;
    line-height:1.05;
    padding:2px 0 0 3px; margin-left:-9px; box-shadow:1px 0 2px rgba(0,0,0,.15);
  }
  .mini-card:first-child{margin-left:0;}
  .mini-card.joker{background:#E9DBFB; border-color:#B79BDB; color:#4A2E70;}

  .hand-wrap{border-top:1px solid var(--line); background:var(--panel); padding:16px 20px 22px;}
  .hand-row{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; min-height:100px; margin-bottom:14px;}
  .card.pick{cursor:pointer; transition:transform .12s ease;}
  .card.pick:hover{transform:translateY(-6px);}
  .card.pick.selected{transform:translateY(-14px); box-shadow:0 0 0 3px var(--gold), 0 6px 14px rgba(0,0,0,.15);}
  .hand-controls{display:flex; justify-content:center; gap:12px; align-items:center;}
  .hand-controls .sel-info{color:var(--text-dim); font-size:12.5px; align-self:center;}
  .spectate-bar{display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; font-size:13px; color:var(--text-dim);}
  .spectate-bar select{padding:5px 10px; border-radius:6px; border:1px solid var(--line); background:#fff; font-family:'Inter',sans-serif; font-size:13px; color:var(--text);}

  .log-panel{
    display:none; max-height:160px; overflow-y:auto;
    background:var(--bg); border-bottom:1px solid var(--line); padding:10px 22px;
    font-size:12px; color:var(--text-dim);
  }
  .log-panel.open{display:block;}
  .log-panel div{padding:2px 0; border-bottom:1px solid var(--panel-2);}
  .log-panel div:last-child{border-bottom:none;}
  .log-panel.empty::before{content:"아직 기록이 없어."; font-style:italic;}


  .overlay-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:28px 30px; max-width:420px; margin:60px auto; text-align:center;
    box-shadow:0 8px 28px rgba(0,0,0,.06);
  }
  .overlay-card h2{color:var(--gold); font-size:20px; margin-bottom:10px;}
  .overlay-card h3{font-size:15px;}
  .overlay-card p{color:var(--text-dim); font-size:13.5px; line-height:1.6;}
  .standing-row{display:flex; justify-content:space-between; padding:8px 4px; border-bottom:1px solid var(--line); font-size:14px;}
  .standing-row:last-child{border-bottom:none;}
  .standing-row .t{color:var(--gold); font-family:'Space Grotesk',sans-serif; font-size:12px; font-weight:600;}

  /* ---- Chat ---- */
  .chat-toggle{
    position:fixed; left:16px; bottom:16px; width:50px; height:50px; border-radius:50%;
    background:var(--gold); color:#fff; display:none; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.15); z-index:50; border:none; padding:0;
  }
  .chat-toggle.has-unread::after{
    content:""; position:absolute; top:2px; right:2px; width:11px; height:11px; border-radius:50%;
    background:var(--crimson); border:2px solid #fff;
  }
  .chat-panel{
    position:fixed; left:16px; bottom:78px; width:300px; max-height:400px;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    display:none; flex-direction:column; overflow:hidden; box-shadow:0 10px 32px rgba(0,0,0,.12); z-index:50;
  }
  .chat-header{display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--line); font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;}
  .chat-header button{border:none; background:none; font-size:16px; cursor:pointer; padding:2px 6px; color:var(--text-dim);}
  .chat-messages{flex:1; overflow-y:auto; padding:10px 14px; font-size:13px; display:flex; flex-direction:column; gap:7px; max-height:280px;}
  .chat-msg b{color:var(--gold); font-weight:600;}
  .chat-input-row{display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--line);}
  .chat-input-row input{flex:1;}
  .chat-input-row button{padding:8px 14px;}

  /* ---- UNO ---- */
  .uno-btn{
    position:fixed; right:16px; bottom:16px; width:64px; height:64px; border-radius:50%;
    background:var(--crimson); color:#fff; border:none;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px;
    cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.18); z-index:50;
    display:flex; align-items:center; justify-content:center;
  }
  .uno-btn:hover:not(:disabled){background:var(--crimson-bright);}
  .uno-btn:disabled{opacity:.35; cursor:not-allowed;}
  .uno-popup{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.4) rotate(-8deg);
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:56px;
    opacity:0; pointer-events:none; text-shadow:0 4px 18px rgba(0,0,0,.2);
    animation:unoPop 1.5s ease forwards; z-index:20; white-space:nowrap;
  }
  @keyframes unoPop{
    0%{opacity:0; transform:translate(-50%,-50%) scale(.4) rotate(-8deg);}
    15%{opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(4deg);}
    28%{opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg);}
    78%{opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(.85) rotate(0deg);}
  }
</style>
</head>
<body>

<!-- ============ CONNECT SCREEN ============ -->
<div id="screen-connect" class="screen active">
  <div class="connect-card">
    <div class="crest">D</div>
    <h1>달무티 온라인</h1>
    <div class="tag">DALMUTI &middot; 친구들과 원격으로</div>

    <div class="field">
      <label for="input-name">닉네임</label>
      <input id="input-name" maxlength="20" placeholder="예: 대달무티">
    </div>

    <button class="primary" id="btn-create" style="width:100%;">새 방 만들기</button>

    <div class="divider">또는</div>

    <div class="field">
      <label for="input-code">초대 코드</label>
      <input id="input-code" maxlength="4" placeholder="4자리 코드" style="text-transform:uppercase; width:100%;">
    </div>
    <button id="btn-join" style="width:100%;">방 참가하기</button>

    <div id="connect-error"></div>
  </div>
</div>

<!-- ============ LOBBY SCREEN ============ -->
<div id="screen-lobby" class="screen">
  <div class="lobby-card">
    <h2 style="color:var(--gold); font-size:20px; margin-bottom:16px;">대기실</h2>
    <div class="room-code-badge">
      <span style="font-size:12px; color:var(--text-dim);">초대 코드</span>
      <span class="code" id="lobby-code">----</span>
    </div>
    <ul class="player-list" id="lobby-players"></ul>
    <div class="extra-card-box" id="extra-card-section"></div>
    <div class="hint" id="lobby-hint"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="primary" id="btn-start" style="display:none;">게임 시작</button>
      <button class="danger" id="btn-leave-lobby" type="button">대기실 나가기</button>
    </div>
  </div>
</div>

<!-- ============ GAME SCREEN ============ -->
<div id="screen-game" class="screen">
  <div class="game-layout">
    <div class="hierarchy" id="hierarchy"></div>
    <div class="table-wrap">
      <div class="topbar">
        <span class="code">방 코드 <b id="topbar-code" style="color:var(--gold);"></b> &middot; <span id="topbar-round"></span></span>
        <div class="topbar-right">
          <button class="log-toggle end-game-btn" id="end-game-btn" type="button" style="display:none;">게임 종료</button>
          <button class="log-toggle" id="log-toggle" type="button">로그</button>
          <span class="status-pill" id="status-pill">대기 중</span>
        </div>
      </div>
      <div class="log-panel" id="log-panel"></div>

      <div class="table-center" id="table-center">
        <div class="turn-banner" id="turn-banner"></div>
        <div class="last-play" id="last-play"></div>
        <div id="overlay-area"></div>
      </div>

      <div class="hand-wrap" id="hand-wrap">
        <div class="spectate-bar" id="spectate-bar" style="display:none;">
          <span id="spectate-label"></span>
          <select id="spectate-select"></select>
        </div>
        <div class="hand-row" id="hand-row"></div>
        <div class="hand-controls">
          <span class="sel-info" id="sel-info"></span>
          <button class="primary" id="btn-play" disabled>카드 내기</button>
          <button class="danger" id="btn-pass" disabled>패스</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============ CHAT ============ -->
<button class="chat-toggle" id="chat-toggle" aria-label="채팅 열기">💬</button>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">채팅 <button id="chat-close" aria-label="닫기">✕</button></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input id="chat-input" placeholder="메시지 입력..." maxlength="200">
    <button class="primary" id="chat-send">전송</button>
  </div>
</div>

<!-- ============ UNO 버튼 ============ -->
<button class="uno-btn" id="uno-btn" type="button" style="display:none;">UNO!</button>

<!-- ============ FIREBASE ============ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
/* =====================================================================
   1) Firebase 설정 — 반드시 본인의 Firebase 프로젝트 값으로 교체하세요.
   Firebase 콘솔 > 프로젝트 설정 > 일반 > "내 앱" 섹션에서 확인 가능합니다.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyANr3cy-wUgfDMloXGI17ah3XwAj56wI8o",
  authDomain: "daljoongdok.firebaseapp.com",
  databaseURL: "https://daljoongdok-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "daljoongdok",
  storageBucket: "daljoongdok.firebasestorage.app",
  messagingSenderId: "195116362516",
  appId: "1:195116362516:web:0b105c39fbf4f024e5b001",
  measurementId: "G-VDY70VMWS1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let uid = null;
let myName = "";
let roomCode = null;
let room = null;          // 현재 방 전체 스냅샷
let selected = [];        // 내 손패 중 선택된 카드 인덱스
let hasJoinedRoom = false; // 방에 참가한 적이 있는지 (추방 감지용)
let spectateTarget = null; // 관전 중인 대상 uid
let lastSeenRound = null;  // 라운드가 바뀌면 관전 대상 초기화용
let taxNoticeDismissedRound = null; // 세금 결과 알림을 닫은 라운드 (다시 안 뜨게)

/* ===================== 유틸 ===================== */
function $(id){ return document.getElementById(id); }
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function genCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for(let i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function buildDeck(){
  const deck = [];
  let cid = 0;
  for(let r=1;r<=12;r++){ for(let i=0;i<r;i++) deck.push({rank:r, id:'c'+(cid++)}); }
  deck.push({rank:0, id:'c'+(cid++)}); deck.push({rank:0, id:'c'+(cid++)}); // 조커 2장
  return deck;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
/* 카드를 인원수만큼 균등 배분하고, 80장이 나누어떨어지지 않을 때 남는 카드는
   extraCardConfig 설정(고정 등수 또는 랜덤)에 따라 배분한다. */
function dealCards(deck, order, extraCardConfig){
  const n = order.length;
  const base = Math.floor(deck.length/n);
  const leftover = deck.length - base*n;
  const hands = {};
  order.forEach(u=>hands[u]=[]);
  let idx = 0;
  order.forEach(u=>{
    for(let i=0;i<base;i++){ hands[u].push(deck[idx++]); }
  });
  let extraIdx = [];
  if(leftover>0){
    if(extraCardConfig && extraCardConfig.mode==='fixed' &&
       Array.isArray(extraCardConfig.ranks) && extraCardConfig.ranks.length===leftover){
      extraIdx = extraCardConfig.ranks;
    } else {
      extraIdx = shuffle(order.map((_,i)=>i)).slice(0, leftover);
    }
    extraIdx.forEach(ri=>{
      const u = order[ri];
      hands[u].push(deck[idx++]);
    });
  }
  return {hands, extraIdx};
}
function sortHand(hand){
  return hand.slice().sort((a,b)=>{
    if(a.rank===0) return 1;
    if(b.rank===0) return -1;
    return a.rank-b.rank;
  });
}
function titleFor(index, n){
  if(index===0) return '대달무티';
  if(index===n-1) return '대농노';
  if(n>=4 && index===1) return '총리대신';
  if(n>=4 && index===n-2) return '소농노';
  return `상인 ${index}`;
}
function nameOf(u){
  return (room && room.players && room.players[u] && room.players[u].name) || '???';
}
const NAME_PALETTE = ['#DE993C','#E8DA31','#5DBF50','#1B90C6','#DF3C3D','#813FBA','#4FBEB5','#DE3D81'];
function colorForUid(u){
  if(room && room.players && room.players[u]){
    const ids = Object.keys(room.players).sort((a,b)=> (room.players[a].joinedAt||0) - (room.players[b].joinedAt||0));
    const idx = ids.indexOf(u);
    if(idx>=0) return NAME_PALETTE[idx % NAME_PALETTE.length];
  }
  // 플레이어 정보를 아직 모를 때(예: 이미 나간 사람)를 위한 안전한 대체 - 해시 기반으로 팔레트에서 선택
  let hash = 0;
  const s = String(u||'');
  for(let i=0;i<s.length;i++){ hash = (hash*31 + s.charCodeAt(i)) & 0x7fffffff; }
  return NAME_PALETTE[hash % NAME_PALETTE.length];
}
function revealedStripHtml(u){
  const revMap = (room.revealed && room.revealed[u]) || {};
  const hand = (room.hands && room.hands[u]) || [];
  const cards = hand.filter(c=>revMap[c.id]);
  if(cards.length===0) return '';
  const inner = cards.map(c=> c.rank===0 ? `<div class="mini-card joker">J</div>` : `<div class="mini-card">${String(c.rank).split('').join('<br>')}</div>`).join('');
  return `<div class="revealed-strip">${inner}</div>`;
}
async function toggleReveal(cardId){
  if(!cardId) return;
  const isRevealed = !!(room.revealed && room.revealed[uid] && room.revealed[uid][cardId]);
  const path = `rooms/${roomCode}/revealed/${uid}/${cardId}`;
  if(isRevealed){ await db.ref(path).remove(); } else { await db.ref(path).set(true); }
}
function pushLog(text){
  const logRef = db.ref(`rooms/${roomCode}/log`);
  logRef.once('value').then(snap=>{
    let log = snap.val() || [];
    log.push({text, ts: Date.now()});
    if(log.length>40) log = log.slice(log.length-40);
    logRef.set(log);
  });
}

let leavingVoluntarily = false;
function subscribeRoom(code){
  let firstSnap = true;
  let seenUnoTs = null;
  db.ref('rooms/'+code).on('value', snap=>{
    const newRoom = snap.val();
    if(hasJoinedRoom && (!newRoom || (newRoom.players && !newRoom.players[uid]))){
      const wasVoluntary = leavingVoluntarily;
      leavingVoluntarily = false;
      handleRemovedFromRoom(wasVoluntary || !newRoom ? null : "방장이 당신을 방에서 내보냈어.");
      return;
    }
    room = newRoom;
    if(!room) return;
    if(firstSnap){
      seenUnoTs = room.unoEvent ? room.unoEvent.ts : null;
      firstSnap = false;
    } else if(room.unoEvent && room.unoEvent.ts !== seenUnoTs){
      seenUnoTs = room.unoEvent.ts;
      showUnoPopup(room.unoEvent);
    }
    render();
  });
}

/* 추방되거나 스스로 방을 나갔을 때 정리하고 접속 화면으로 되돌림 */
function handleRemovedFromRoom(message){
  const code = roomCode;
  hasJoinedRoom = false;
  clearSession();
  db.ref('rooms/'+code).off();
  db.ref('chats/'+code).off();
  room = null; roomCode = null;

  $('uno-btn').style.display = 'none';

}

function renderExtraCardSection(count){
  const sec = $('extra-card-section');
  if(count<2 || count>8){ sec.style.display='none'; return; }
  const base = Math.floor(80/count);
  const leftover = 80 - base*count;
  if(leftover===0){ sec.style.display='none'; return; }
  sec.style.display='block';
  const isHost = uid===room.hostUid;
  const cfg = room.extraCardConfig || {mode:'random'};
  let optsHtml = '';
  for(let i=0;i<count;i++){
    const checked = cfg.mode==='fixed' && cfg.ranks && cfg.ranks.includes(i);
    optsHtml += `<label class="ecb-opt"><input type="checkbox" data-idx="${i}" ${checked?'checked':''} ${isHost?'':'disabled'}> ${titleFor(i,count)}</label>`;
  }
  const statusText = cfg.mode==='random'
    ? '현재: 매 라운드 랜덤 배분'
    : `현재: ${(cfg.ranks||[]).map(i=>titleFor(i,count)).join(', ') || '선택 없음 (부족분은 랜덤 처리됨)'}`;
  sec.innerHTML = `
    <div class="ecb-title">여분 카드 배분</div>
    <div class="ecb-desc">80장 ÷ ${count}명 = ${base}장씩 배분, ${leftover}장 남음. 남는 카드를 받을 등수를 선택하거나 랜덤으로 맡겨줘.</div>
    <div class="ecb-options">${optsHtml}</div>
    ${isHost ? `<button id="ecb-random" type="button">랜덤으로 정하기</button>` : ''}
    <div class="ecb-status">${statusText}</div>
  `;
  if(isHost){
    sec.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.addEventListener('change', ()=>toggleExtraRank(parseInt(cb.dataset.idx,10), leftover));
    });
    $('ecb-random').addEventListener('click', setExtraRandom);
  }
}

function toggleExtraRank(idx, leftover){
  const cfg = room.extraCardConfig || {};
  let ranks = (cfg.mode==='fixed' && Array.isArray(cfg.ranks)) ? cfg.ranks.slice() : [];
  const pos = ranks.indexOf(idx);
  if(pos>=0){
    ranks.splice(pos,1);
  } else {
    if(ranks.length>=leftover) return; // 남는 카드 수 초과 선택 무시
    ranks.push(idx);
  }
  db.ref(`rooms/${roomCode}/extraCardConfig`).set({mode:'fixed', ranks});
}
function setExtraRandom(){
  db.ref(`rooms/${roomCode}/extraCardConfig`).set({mode:'random'});
}

/* 방장이 플레이어를 추방 (로비 또는 게임 진행 중) */
async function kickPlayer(targetUid, targetName){
  if(uid!==room.hostUid) return;
  if(room.status==='lobby'){
    await db.ref(`rooms/${roomCode}/players/${targetUid}`).remove();
    pushLog(`${targetName}님이 방장에 의해 방에서 나갔습니다.`);
    return;
  }
  // 게임 진행 중 추방: 순위/손패에서도 제거하고 턴이 끊기지 않도록 정리
  const updates = {};
  updates[`players/${targetUid}`] = null;
  updates[`hands/${targetUid}`] = null;

  const order = (room.order||[]).filter(u=>u!==targetUid);
  updates['order'] = order;

  let finishedOrder = (room.finishedOrder||[]).filter(u=>u!==targetUid);
  updates['finishedOrder'] = finishedOrder;

  if(room.status==='playing'){
    const hands = {...room.hands, [targetUid]: []};
    const stillActive = order.filter(u=>(hands[u]||[]).length>0);
    if(stillActive.length<=1){
      order.forEach(u=>{ if(!finishedOrder.includes(u)) finishedOrder.push(u); });
      updates['finishedOrder'] = finishedOrder;
      updates['status'] = 'roundEnd';
      updates['currentTurnUid'] = null;
      updates['currentLeaderUid'] = null;
    } else if(room.currentLeaderUid===targetUid){
      const newLeader = nextActiveUid(order, targetUid, hands, []);
      updates['lastPlay'] = null;
      updates['passedUids'] = [];
      updates['currentLeaderUid'] = newLeader;
      updates['currentTurnUid'] = newLeader;
    } else if(room.currentTurnUid===targetUid){
      updates['currentTurnUid'] = nextActiveUid(order, targetUid, hands, []);
    }
  }
  await db.ref('rooms/'+roomCode).update(updates);
  pushLog(`${targetName}님이 방장에 의해 게임에서 추방되었습니다.`);
}

$('btn-start').addEventListener('click', async ()=>{
  if(uid!==room.hostUid) return;
  const order = shuffle(Object.keys(room.players));
  const deck = shuffle(buildDeck());
  const {hands, extraIdx} = dealCards(deck, order, room.extraCardConfig);
  await db.ref('rooms/'+roomCode).update({
    status: 'playing',
    round: 1,
    order,
    hands,
    finishedOrder: [],
    currentLeaderUid: order[0],
    currentTurnUid: order[0],
    lastPlay: null,
    passedUids: [],
    revealed: null,
    unoUsedBy: null,
    unoEvent: null,
    lastTaxResult: null
  });
  if(extraIdx.length){
    pushLog(`여분 카드 ${extraIdx.length}장을 ${extraIdx.map(i=>titleFor(i, order.length)).join(', ')} 등수가 받았습니다.`);
  }
  pushLog(`게임이 시작되었습니다. 첫 판은 순위 없이 무작위로 자리를 정합니다.`);
});

$('btn-leave-lobby').addEventListener('click', async ()=>{
  if(!room || room.status!=='lobby') return;
  if(!confirm('대기실에서 나갈까?')) return;
  const code = roomCode;
  const leavingName = myName;
  const players = room.players || {};
  const remainingUids = Object.keys(players).filter(u=>u!==uid);

  leavingVoluntarily = true;

  if(remainingUids.length===0){
    // 마지막 사람이 나가면 방 자체를 삭제
    await db.ref('rooms/'+code).remove();
    await db.ref('chats/'+code).remove();
    return;
  }

  const updates = {};
  updates[`players/${uid}`] = null;
  if(room.hostUid===uid){
    // 가장 먼저 들어온 사람이 새 방장이 됨
    const newHost = remainingUids.reduce((a,b)=> (players[a].joinedAt <= players[b].joinedAt ? a : b));
    updates['hostUid'] = newHost;
  }
  const logRef = db.ref(`rooms/${code}/log`);
  const logSnap = await logRef.once('value');
  let log = logSnap.val() || [];
  log.push({text:`${leavingName}님이 방을 나갔습니다.`, ts: Date.now()});
  if(log.length>40) log = log.slice(log.length-40);
  updates['log'] = log;

  await db.ref('rooms/'+code).update(updates);
});

function makeCardEl(card, pickable, idx){
  const el = document.createElement('div');
  el.className = 'card' + (card.rank===0?' joker':'') + (pickable?' pick':'');
  if(card.rank===0){
    el.innerHTML = `JOKER<span class="sub">WILD</span>`;
  } else {
    el.textContent = card.rank;
  }
  if(pickable){
    if(selected.includes(idx)) el.classList.add('selected');
    el.addEventListener('click', ()=>toggleSelect(idx));
  }
  return el;
}

function renderHand(){
  const raw = (room.hands && room.hands[uid]) || [];
  const isFinished = raw.length===0;

  if(isFinished && room.status==='playing'){
    renderSpectateView();
    return;
  }
  $('spectate-bar').style.display = 'none';
  $('btn-play').style.display = '';
  $('btn-pass').style.display = '';

  const order = raw.map((c,i)=>i).sort((a,b)=>{
    const ca=raw[a], cb=raw[b];
    if(ca.rank===0) return 1;
    if(cb.rank===0) return -1;
    return ca.rank-cb.rank;
  });
  const row = $('hand-row'); row.innerHTML = '';
  const revMap = (room.revealed && room.revealed[uid]) || {};
  order.forEach(i=>{
    const card = raw[i];
    const el = makeCardEl(card, true, i);
    const isRevealed = !!revMap[card.id];
    const eyeBtn = document.createElement('button');
    eyeBtn.type = 'button';
    eyeBtn.className = 'reveal-toggle' + (isRevealed?' active':'');
    eyeBtn.textContent = '👁';
    eyeBtn.title = isRevealed ? '비공개로 전환' : '모두에게 공개';
    eyeBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleReveal(card.id); });
    el.appendChild(eyeBtn);
    row.appendChild(el);
  });

  const myTurn = room.currentTurnUid===uid && room.status==='playing';
  $('sel-info').textContent = selected.length
    ? `${selected.length}장 선택됨`
    : '카드를 클릭해서 선택해줘';

  const validity = checkPlayValidity(raw, selected);
  $('btn-play').disabled = !(myTurn && validity.ok);
  const leading = !room.lastPlay;
  $('btn-pass').disabled = !(myTurn && !leading);
}

function renderSpectateView(){
  $('spectate-bar').style.display = 'flex';
  $('btn-play').style.display = 'none';
  $('btn-pass').style.display = 'none';
  $('sel-info').textContent = '';

  const order = room.order || [];
  const others = order.filter(u=>u!==uid);
  if(spectateTarget && !others.includes(spectateTarget)) spectateTarget = null;
  if(!spectateTarget && others.length>0) spectateTarget = others[0];

  const sel = $('spectate-select');
  if(others.length===0){
    sel.style.display = 'none';
    $('spectate-label').textContent = '관전할 수 있는 다른 플레이어가 없어.';
  } else {
    sel.style.display = '';
    $('spectate-label').textContent = '관전 중:';
    sel.innerHTML = others.map(u=>`<option value="${u}" ${u===spectateTarget?'selected':''}>${escapeHtml(nameOf(u))} (${(room.hands[u]||[]).length}장)</option>`).join('');
  }

  const row = $('hand-row'); row.innerHTML = '';
  if(!spectateTarget) return;
  const targetHand = sortHand(room.hands[spectateTarget] || []);
  targetHand.forEach(c=> row.appendChild(makeCardEl(c, false)) );
}

function toggleSelect(idx){
  const i = selected.indexOf(idx);
  if(i>=0) selected.splice(i,1); else selected.push(idx);
  renderHand();
}

function checkPlayValidity(raw, sel){
  if(sel.length===0) return {ok:false};
  const cards = sel.map(i=>raw[i]);
  const nonJoker = cards.filter(c=>c.rank!==0);
  let effRank;
  if(nonJoker.length===0){ effRank = 13; }
  else{
    const r = nonJoker[0].rank;
    if(!nonJoker.every(c=>c.rank===r)) return {ok:false};
    effRank = r;
  }
  const lastPlay = room.lastPlay;
  if(lastPlay && lastPlay.cards && lastPlay.cards.length){
    if(cards.length !== lastPlay.count) return {ok:false};
    if(!(effRank < lastPlay.rank)) return {ok:false};
  }
  return {ok:true, effRank, count:cards.length};
}

$('btn-play').addEventListener('click', async ()=>{
  const raw = (room.hands && room.hands[uid]) || [];
  const v = checkPlayValidity(raw, selected);
  if(!v.ok) return;
  const playedCards = selected.map(i=>raw[i]).sort((a,b)=>a.rank-b.rank);
  const newHand = raw.filter((c,i)=>!selected.includes(i));
  const order = room.order;

  const updates = {};
  updates[`hands/${uid}`] = newHand;
  updates['lastPlay'] = { uid, cards: playedCards, count: v.count, rank: v.effRank };
  updates['currentLeaderUid'] = uid;
  updates['passedUids'] = [];

  let finishedOrder = (room.finishedOrder||[]).slice();
  if(newHand.length===0 && !finishedOrder.includes(uid)){
    finishedOrder.push(uid);
  }
  updates['finishedOrder'] = finishedOrder;

  const activePlayers = order.filter(u=> u===uid ? newHand.length>0 : (room.hands[u]||[]).length>0 );

  if(activePlayers.length<=1){
    order.forEach(u=>{ if(!finishedOrder.includes(u)) finishedOrder.push(u); });
    updates['finishedOrder'] = finishedOrder;
    updates['status'] = 'roundEnd';
    updates['currentTurnUid'] = null;
    updates['currentLeaderUid'] = null;
    await db.ref('rooms/'+roomCode).update(updates);
    pushLog(`라운드가 종료되었습니다.`);
  } else {
    const next = nextActiveUid(order, uid, {...room.hands, [uid]:newHand}, []);
    updates['currentTurnUid'] = next;
    await db.ref('rooms/'+roomCode).update(updates);
    pushLog(`${myName}님이 ${cardsLabel(playedCards)} 를 냈습니다.`);
  }
  selected = [];
});

$('btn-pass').addEventListener('click', async ()=>{
  const order = room.order;
  const leader = room.currentLeaderUid;
  const hands = room.hands;
  const passedUids = (room.passedUids||[]).slice();
  if(!passedUids.includes(uid)) passedUids.push(uid);

  const activeUids = order.filter(u=>(hands[u]||[]).length>0);
  const others = activeUids.filter(u=>u!==leader);
  const trickDone = others.every(u=>passedUids.includes(u));

  if(trickDone){
    const leaderStillActive = (hands[leader]||[]).length>0;
    if(!leaderStillActive){
      // 리더가 이미 마지막 카드를 냈던 경우 -> 다음 순서 플레이어가 새 트릭을 시작
      const stillActive = activeUids; // leader는 이미 activeUids에서 제외됨
      if(stillActive.length<=1){
        const finishedOrder = (room.finishedOrder||[]).slice();
        order.forEach(u=>{ if(!finishedOrder.includes(u)) finishedOrder.push(u); });
        await db.ref('rooms/'+roomCode).update({
          finishedOrder, status:'roundEnd', currentTurnUid:null, currentLeaderUid:null
        });
        pushLog(`라운드가 종료되었습니다.`);
        return;
      }
      const newLeader = nextActiveUid(order, leader, hands, []);
      await db.ref('rooms/'+roomCode).update({
        lastPlay: null, passedUids: [], currentLeaderUid: newLeader, currentTurnUid: newLeader
      });
      pushLog(`모두 패스 — ${nameOf(newLeader)}님이 다음 트릭을 시작합니다.`);
    } else {
      await db.ref('rooms/'+roomCode).update({
        lastPlay: null, passedUids: [], currentLeaderUid: leader, currentTurnUid: leader
      });
      pushLog(`모두 패스 — ${nameOf(leader)}님이 다음 트릭을 시작합니다.`);
    }
  } else {
    const next = nextActiveUid(order, uid, hands, []);
    await db.ref('rooms/'+roomCode).update({ currentTurnUid: next, passedUids });
    pushLog(`${myName}님이 패스했습니다.`);
  }
});

function nextActiveUid(order, fromUid, hands, skipList){
  const n = order.length;
  let idx = order.indexOf(fromUid);
  for(let step=1; step<=n; step++){
    const cand = order[(idx+step)%n];
    if((hands[cand]||[]).length>0 && !skipList.includes(cand)) return cand;
  }
  return fromUid;
}

async function startTaxExchange(){

function taxGiveOrder(hand){

}

function renderTaxGiveUI(key, ex){

    const eyeBtn = document.createElement('button');
    eyeBtn.type = 'button';
    eyeBtn.className = 'reveal-toggle' + (isRevealed?' active':'');
    eyeBtn.textContent = '👁';
    eyeBtn.title = isRevealed ? '비공개로 전환' : '모두에게 공개';
    eyeBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleReveal(c.id); });
    el.appendChild(eyeBtn);
    row.appendChild(el);
  });
  box.appendChild(row);
  const btn = document.createElement('button');
  btn.className = 'danger'; btn.textContent = '상납하기';
  btn.addEventListener('click', async ()=>{
    btn.disabled = true;
    const currentRaw = room.hands[uid] || [];
    const currentToGive = taxGiveOrder(currentRaw).slice(0, ex.count);
    const giveIds = currentToGive.map(c=>c.id);
    const remainFrom = currentRaw.filter(c=>!giveIds.includes(c.id));
    const newToHand = (room.hands[ex.to]||[]).concat(currentToGive);
    const updates = {};
    updates[`hands/${uid}`] = remainFrom;
    updates[`hands/${ex.to}`] = newToHand;
    updates[`tax/${key}/step`] = 'return';
    updates[`tax/${key}/given`] = currentToGive;
    await db.ref('rooms/'+roomCode).update(updates);
    pushLog(`${myName}님이 ${nameOf(ex.to)}님에게 최고 카드 ${ex.count}장을 상납했습니다.`);
  });
  box.appendChild(btn);
  $('overlay-area').appendChild(box);
}

function renderTaxReturnUI(key, ex){
  const raw = sortHand(room.hands[uid] || []);
  const box = document.createElement('div');
  box.className = 'overlay-card';
  box.innerHTML = `<h3 style="color:var(--gold); margin-bottom:10px;">${escapeHtml(nameOf(ex.from))}님에게 돌려줄 카드 ${ex.count}장을 선택해줘</h3>`;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:10px 0;';
  const localSel = [];
  raw.forEach((c,i)=>{
    const el = makeCardEl(c, false);
    el.classList.add('pick');
    el.addEventListener('click', ()=>{
      const pos = localSel.indexOf(i);
      if(pos>=0){ localSel.splice(pos,1); el.classList.remove('selected'); }
      else if(localSel.length<ex.count){ localSel.push(i); el.classList.add('selected'); }
    });
    row.appendChild(el);
  });
  box.appendChild(row);
  const btn = document.createElement('button');
  btn.className = 'primary'; btn.textContent = '반환 확정';
  btn.addEventListener('click', async ()=>{
    if(localSel.length!==ex.count){ return; }
    btn.disabled = true;
    const returned = localSel.map(i=>raw[i]);
    const remain = raw.filter((c,i)=>!localSel.includes(i));
    const fromNewHand = (room.hands[ex.from]||[]).concat(returned);
    const updates = {};
    updates[`hands/${uid}`] = remain;
    updates[`hands/${ex.from}`] = fromNewHand;
    updates[`tax/${key}/step`] = 'done';
    updates[`tax/${key}/returned`] = returned;
    await db.ref('rooms/'+roomCode).update(updates);
    pushLog(`${myName}님이 ${nameOf(ex.from)}님에게 카드 ${ex.count}장을 돌려줬습니다.`);
    checkTaxComplete();
  });
  box.appendChild(btn);
  $('overlay-area').appendChild(box);
}

async function checkTaxComplete(){
  const snap = await db.ref('rooms/'+roomCode+'/tax').once('value');
  const tax = snap.val();
  if(!tax) return;
  const ex1Done = tax.ex1 && tax.ex1.step==='done';
  const ex2Done = !tax.ex2 || tax.ex2.step==='done'; // ex2 자체가 없으면(2,3인) 완료로 간주
  if(ex1Done && ex2Done){
    const lastTaxResult = {};
    if(tax.ex1) lastTaxResult.ex1 = { from: tax.ex1.from, to: tax.ex1.to, given: tax.ex1.given||[], returned: tax.ex1.returned||[] };
    if(tax.ex2) lastTaxResult.ex2 = { from: tax.ex2.from, to: tax.ex2.to, given: tax.ex2.given||[], returned: tax.ex2.returned||[] };
    await db.ref('rooms/'+roomCode).update({
      status:'playing', tax:null, lastTaxResult,
      currentLeaderUid: room.order[0], currentTurnUid: room.order[0]
    });
    pushLog(`세금 교환 완료. ${nameOf(room.order[0])}님부터 시작합니다.`);
  }
}

async function startNextRound(newOrder){
  const deck = shuffle(buildDeck());
  const {hands, extraIdx} = dealCards(deck, newOrder, room.extraCardConfig);
  const eligible = newOrder.filter(u=>{
    const jokers = hands[u].filter(c=>c.rank===0).length;
    return jokers===2;
  });
  const updates = {
    order: newOrder,
    hands,
    round: (room.round||1)+1,
    finishedOrder: [],
    lastPlay: null,
    passedUids: [],
    currentTurnUid: null,
    currentLeaderUid: null,
    revealed: null,
    unoUsedBy: null,
    unoEvent: null,
    lastTaxResult: null
  };
  if(eligible.length>0){
    updates.status = 'tax_check';
    updates.tax = { eligible };
  } else {
    updates.status = 'tax';
    const n = newOrder.length;
    updates.tax = { ex1: { from: newOrder[n-1], to: newOrder[0], count: 2, step: 'give' } };
    if(n>=4){
      updates.tax.ex2 = { from: newOrder[n-2], to: newOrder[1], count: 1, step: 'give' };
    }
  }
  await db.ref('rooms/'+roomCode).update(updates);
  if(extraIdx.length){
    pushLog(`여분 카드 ${extraIdx.length}장을 ${extraIdx.map(i=>titleFor(i, newOrder.length)).join(', ')} 등수가 받았습니다.`);
  }
  pushLog(`${updates.round}라운드가 시작되었습니다.`);
}

/* ===================== 채팅 ===================== */
let chatOpen = false;
let chatMessages = [];
let lastChatCount = 0;

function showChatUI(){
  $('chat-toggle').style.display = 'flex';
}
function hideChatUI(){
  $('chat-toggle').style.display = 'none';
  $('chat-toggle').classList.remove('has-unread');
  $('chat-panel').style.display = 'none';
  chatOpen = false;
  chatMessages = [];
  lastChatCount = 0;
}
function subscribeChat(code){
  db.ref('chats/'+code).limitToLast(50).on('value', snap=>{
    const val = snap.val() || {};
    chatMessages = Object.values(val).sort((a,b)=>a.ts-b.ts);
    renderChat();
  });
}
function renderChat(){
  const box = $('chat-messages');
  box.innerHTML = chatMessages.map(m=>
    `<div class="chat-msg"><b style="color:${m.uid ? colorForUid(m.uid) : 'var(--gold)'}">${escapeHtml(m.name)}</b> ${escapeHtml(m.text)}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
  if(!chatOpen && chatMessages.length>lastChatCount){
    $('chat-toggle').classList.add('has-unread');
  }
  lastChatCount = chatMessages.length;
}
function toggleChatPanel(){
  chatOpen = !chatOpen;
  $('chat-panel').style.display = chatOpen ? 'flex' : 'none';
  if(chatOpen){ $('chat-toggle').classList.remove('has-unread'); }
}
function sendChat(){
  const input = $('chat-input');
  const text = input.value.trim();
  if(!text || !roomCode) return;
  db.ref('chats/'+roomCode).push({ uid, name: myName || '???', text, ts: Date.now() });
  input.value = '';
}
$('chat-toggle').addEventListener('click', toggleChatPanel);
$('chat-close').addEventListener('click', toggleChatPanel);
$('chat-send').addEventListener('click', sendChat);
$('chat-input').addEventListener('keydown', e=>{
  if(e.key==='Enter') sendChat();
});
</script>
